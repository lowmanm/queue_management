services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexus_queue
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexus -d nexus_queue']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://nexus:nexus_dev_password@postgres:5432/nexus_queue
      REDIS_URL: redis://redis:6379
      JWT_SECRET: changeme_in_production_use_env_secret
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/agent-workspace/Dockerfile
    ports:
      - '4200:80'
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:v2.50.0
    profiles: [monitoring]
    volumes:
      - ./prometheus:/etc/prometheus
    ports:
      - '9090:9090'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - api

  grafana:
    image: grafana/grafana:10.3.0
    profiles: [monitoring]
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana:/etc/grafana/provisioning/dashboards
    ports:
      - '3001:3000'
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data:
